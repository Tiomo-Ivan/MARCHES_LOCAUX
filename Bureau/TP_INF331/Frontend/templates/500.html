{% extends "base.html" %}

{% block title %}Erreur serveur - MARCHES LOCAUX{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card">
            <div class="card-body">
                <i class="fas fa-exclamation-circle fa-5x text-danger mb-4"></i>
                <h1 class="card-title">Erreur interne du serveur</h1>
                <p class="card-text">
                    Une erreur inattendue s'est produite. Nos équipes ont été notifiées.
                    Veuillez réessayer plus tard.
                </p>
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Retour à l'accueil
                </a>
                <button onclick="history.back()" class="btn btn-secondary ms-2">
                    <i class="fas fa-arrow-left"></i> Page précédente
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
