{% extends "base.html" %}

{% block title %}{% if market %}Éditer{% else %}Créer{% endif %} un Marché{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h1><i class="fas fa-{% if market %}edit{% else %}plus{% endif %}"></i> {% if market %}Éditer{% else %}Créer{% endif %} un Marché</h1>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nom</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ market.name if market else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="city" class="form-label">Ville</label>
                        <input type="text" class="form-control" id="city" name="city" value="{{ market.city if market else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ market.description if market else '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="latitude" class="form-label">Latitude</label>
                        <input type="number" step="any" class="form-control" id="latitude" name="latitude" value="{{ market.latitude if market else '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="longitude" class="form-label">Longitude</label>
                        <input type="number" step="any" class="form-control" id="longitude" name="longitude" value="{{ market.longitude if market else '' }}">
                    </div>

                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Enregistrer</button>
                    <a href="{{ url_for('markets.list_markets') }}" class="btn btn-secondary ms-2"><i class="fas fa-times"></i> Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
